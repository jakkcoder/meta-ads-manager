<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Meta Ads Manager{% endblock %}</title>
  <style>
    :root { --bg: #0f1419; --card: #1a2332; --text: #e7ecf3; --muted: #8b9cb3; --accent: #3b82f6; --border: #2d3a4f; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); margin: 0; }
    nav { background: var(--card); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; gap: 1.5rem; align-items: center; }
    nav a { color: var(--text); text-decoration: none; font-weight: 500; }
    nav a:hover { color: var(--accent); }
    .brand { font-weight: 700; color: var(--accent); margin-right: auto; }
    main { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; }
    h1, h2 { margin-top: 0; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.75rem; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-size: 0.85rem; text-transform: uppercase; }
    .btn { background: var(--accent); color: white; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-danger { background: #dc2626; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; }
    .stat { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; }
    .stat-value { font-size: 2rem; font-weight: 700; }
    .stat-label { color: var(--muted); font-size: 0.9rem; }
    .muted { color: var(--muted); }
    form.inline { display: inline; }
    input, select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 0.5rem; border-radius: 6px; }
    .tree { margin-left: 1rem; border-left: 2px solid var(--border); padding-left: 1rem; }
    .tree-item { margin-bottom: 0.75rem; }
  </style>
</head>
<body>
  <nav>
    <span class="brand">Meta Ads Manager</span>
    <a href="/">Overview</a>
    <a href="/leads">Leads</a>
    <a href="/leads/parents">Parent Leads</a>
    <a href="/leads/gold">Gold Leads</a>
    <a href="/ops">Ops Dashboard</a>
    <a href="/bookings/parent">Parent Bookings</a>
    <a href="/ads">Ads</a>
    <a href="/services">All Services</a>
    <a href="/cmo/">CMO</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
